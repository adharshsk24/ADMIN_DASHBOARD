<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SWIFT Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-header">
            <h1>SWIFT</h1>
            <p>Admin Dashboard Login</p>
        </div>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="admin@swift.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-login">
                Sign In <i class="fa fa-arrow-right"></i>
            </button>
        </form>
        <div class="mt-20">
            <p style="font-size: 0.8rem; color: var(--text-muted); text-align: left; line-height: 1.4;">
                <b>Super Admin</b>: admin@swift.com / admin<br>
                <b>REC CAFE</b>: cafe@swift.com / cafe<br>
                <b>HUT CAFE</b>: hut@swift.com / hut<br>
                <b>GARDEN</b>: garden@swift.com / garden<br>
                <b>REC MART</b>: mart@swift.com / mart<br>
                <b>FRESH CRUSH</b>: fresh@swift.com / fresh
            </p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const result = AuthService.login(email, password);
            if (result.success) {
                window.location.href = 'dashboard.html';
            } else {
                alert(result.message);
            }
        });

        // Redirect if already logged in
        if (AuthService.isAuthenticated()) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
